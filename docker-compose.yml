# Dev-only stack: app (FastAPI + uvicorn --reload) and db (postgres:16).
# Not intended for production use.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/memory_ai
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memory_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memory_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
