<div id="folder-{{ folder.id }}-sources-section">
    <div id="folder-{{ folder.id }}-upload-error" role="alert">
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </div>

    {% if not sources %}
    <p id="sources-empty-state-{{ folder.id }}">No files uploaded yet.</p>
    {% endif %}
    <ul id="sources-list-{{ folder.id }}">
        {% for source in sources %}
        <li id="source-{{ source.id }}">
            {{ source.filename }}
            {% include "_source_status.html" %}
        </li>
        {% endfor %}
    </ul>

    <form id="upload-form-{{ folder.id }}"
          hx-post="/folders/{{ folder.id }}/sources"
          hx-target="#folder-{{ folder.id }}-sources-section"
          hx-swap="outerHTML"
          hx-encoding="multipart/form-data">
        <label for="upload-file-input-{{ folder.id }}">Upload a note (PDF, MD, or TXT)</label>
        <input type="file" id="upload-file-input-{{ folder.id }}" name="file" required>
        <button type="submit">Upload</button>
    </form>
</div>
