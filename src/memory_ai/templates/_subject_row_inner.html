<span id="subject-{{ subject.id }}-name">{{ subject.name }}</span>
<button type="button"
        hx-get="/subjects/{{ subject.id }}/edit"
        hx-target="#subject-{{ subject.id }}"
        hx-swap="outerHTML">Rename</button>
<button type="button"
        hx-delete="/subjects/{{ subject.id }}"
        hx-target="#subject-{{ subject.id }}"
        hx-swap="outerHTML"
        hx-confirm="Delete this subject and everything inside it?">Delete</button>
