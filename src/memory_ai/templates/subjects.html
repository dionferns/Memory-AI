<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Subjects - Memory AI</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!--
      Load the quiz-navigation module once, up-front, for the whole page.
      The "Quiz Me" response fragment (_quiz_result.html) only calls
      MemoryAIQuiz.init(...); it must not re-inject this <script src> itself,
      because a dynamically-inserted external script defaults to async and can
      run *after* the inline init() call on the first click (see issue #123).
      subjects.html is the only full page that renders the "Quiz Me" button
      (via _subject_row -> _subject_folders_section -> _folder_row ->
      _folder_row_inner -> _folder_sources_section), and every quiz fragment is
      swapped into this document, so loading it here covers all of them.
    -->
    <script src="/static/quiz.js"></script>
</head>
<body>
    <main>
        <h1>My Subjects</h1>

        {% if not subjects %}
        <p id="subjects-empty-state">You don't have any subjects yet. Create one to get started.</p>
        {% endif %}

        <ul id="subjects-list">
            {% for subject in subjects %}
                {% include "_subject_row.html" %}
            {% endfor %}
        </ul>

        {% include "_create_subject_form.html" %}
    </main>
</body>
</html>
