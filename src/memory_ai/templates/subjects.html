<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Subjects - Memory AI</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!--
      Load the quiz-navigation module once, up-front, for the whole page.
      The "Quiz Me" response fragment (_quiz_result.html) only calls
      MemoryAIQuiz.init(...); it must not re-inject this <script src> itself,
      because a dynamically-inserted external script defaults to async and can
      run *after* the inline init() call on the first click (see issue #123).
      subjects.html is this app's one full page hosting the sidebar tree +
      note content pane (ticket 14), and every quiz fragment is swapped into
      this document, so loading it here still covers all of them.
    -->
    <script src="/static/quiz.js"></script>
</head>
<body>
    <div class="app-layout" id="app-layout">
        <!--
          Ticket 14 decision #13: below a ~768px viewport the sidebar
          collapses behind this toggle rather than staying an
          always-visible column. No JS framework/router involved -- a
          single inline class toggle on the layout wrapper, styled entirely
          by styles.css's `.sidebar-open` media-query rule (matching this
          app's existing minimal-JS approach, e.g. quiz.js).
        -->
        <button type="button"
                id="sidebar-toggle"
                aria-controls="sidebar"
                aria-label="Toggle subjects sidebar"
                onclick="document.getElementById('app-layout').classList.toggle('sidebar-open')">&#9776; Subjects</button>

        <nav class="sidebar" id="sidebar" aria-label="Subjects, folders, and notes">
            <h1>My Subjects</h1>

            {% if not subjects %}
            <p id="subjects-empty-state">You don't have any subjects yet. Create one to get started.</p>
            {% endif %}

            <ul id="subjects-list">
                {% for subject in subjects %}
                    {% include "_subject_row.html" %}
                {% endfor %}
            </ul>

            {% include "_create_subject_form.html" %}
        </nav>

        <main class="content-pane" id="content-pane">
            {% include "_right_pane_placeholder.html" %}
        </main>
    </div>
</body>
</html>
